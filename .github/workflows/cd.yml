name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Create buildx builder
        run: |
          docker buildx create --use --name mybuilder
          docker buildx inspect --bootstrap

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Dependency Cache
        run: |
          docker buildx build \
          --builder mybuilder \
          --platform linux/amd64 \
          --push \
          --file Dockerfile \
          --tag ${{ secrets.DOCKERHUB_USERNAME }}/assu-app:dependency-cache \
          --target dependencies \
          --cache-to type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/assu-app:dependency-cache,mode=max \
          .

      - name: Build & Push Final App Image
        run: |
          docker buildx build \
            --builder mybuilder \
            --platform linux/amd64 \
            --push \
            --file Dockerfile \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/assu-app:latest \
            --build-arg DEPENDENCY_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/assu-app:dependency-cache \
            --cache-from type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/assu-app:dependency-cache \
            .

      - name: Create application-secret.yml
        run: echo "${{ secrets.APPLICATION_SECRET }}" > ./application-secret.yml
        shell: bash

      - name: Create service-account.json
        run: echo "${{ secrets.SERVICE_ACCOUNT_B64 }}" | base64 -d > ./service-account.json
        shell: bash

      - name: Copy application-secret.yml to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          username: ubuntu
          host: ${{ secrets.EC2_HOST }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./application-secret.yml
          target: /home/ubuntu/secret/

      - name: Copy service-account.json to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          username: ubuntu
          host: ${{ secrets.EC2_HOST }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./service-account.json
          target: /home/ubuntu/secret/

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.3
        with:
          username: ubuntu
          host: ${{ secrets.EC2_HOST }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./docker-compose.yml
          target: /home/ubuntu/cicd/

      - name: Upload deploy.sh to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./deploy.sh
          target: /home/ubuntu/cicd/

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/assu-app:latest
            sudo chmod +x /home/ubuntu/cicd/deploy.sh
            sudo /home/ubuntu/cicd/deploy.sh

      # 4-1. 테스트 서버 전용 파일 전송
      - name: [TEST] Copy Files to Test EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.TEST_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.TEST_EC2_SSH_KEY }}
          source: "./application-secret.yml,./service-account.json,./docker-compose.test.yml"
          target: "/home/ubuntu/cicd_temp/"

      # 4-2. 테스트 서버 환경 정리 (폴더 생성 및 파일 이동)
      - name: [TEST] Organize Files and Directories
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.TEST_EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/secret /home/ubuntu/cicd
            mv /home/ubuntu/cicd_temp/application-secret.yml /home/ubuntu/secret/
            mv /home/ubuntu/cicd_temp/service-account.json /home/ubuntu/secret/
            mv /home/ubuntu/cicd_temp/docker-compose.test.yml /home/ubuntu/cicd/
            rm -rf /home/ubuntu/cicd_temp

      # 4-3. 테스트 서버 도커 로그인 및 이미지 갱신
      - name: [TEST] Docker Login and Pull
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.TEST_EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            cd /home/ubuntu/cicd
            docker compose -f docker-compose.test.yml pull

      # 4-4. 테스트 서버 컨테이너 실행
      - name: [TEST] Deploy Containers
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.TEST_EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/cicd
            docker compose -f docker-compose.test.yml up -d
            
      - name: Send Discord Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          
          # 반복 폴링 헬스체크
          HEALTH_STATUS="❌ 서버 비정상 작동"
          for i in {1..20}; do
          if curl -sSf https://assu.shop/actuator/health >/dev/null; then
          HEALTH_STATUS="✅ 서버 정상 작동"
          break
          fi
          echo "서버 응답 대기 중... ($i/20)"
          sleep 10
          done
          
          MESSAGE="$EMOJI **assu 배포 결과**\\n상태: $STATUS\\n$HEALTH_STATUS\\n🔗 프로젝트: ${{ github.repository }}\\n👤 커밋: ${{ github.actor }}"
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"$MESSAGE\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }} || true